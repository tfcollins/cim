name: Deploy

on:
  push:
    tags:
      - '*.*.*'
      - '*.*.*-*'

permissions:
  contents: write

jobs:
  build-and-upload:
    name: Build and upload
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - build: linux-musl
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl

          - build: linux-aarch64
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu

          - build: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu

          - build: macos-x86_64
            os: macos-latest
            target: x86_64-apple-darwin

          - build: macos-aarch64
            os: macos-latest
            target: aarch64-apple-darwin

          - build: windows
            os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Get the release version from the tag
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '20'

      - name: Update extension version
        shell: bash
        run: |
          # Update dsdk-vscode package.json version to match release tag
          sed -i.bak 's/"version": "[^"]*"/"version": "${{ env.VERSION }}"/' dsdk-vscode/package.json
          rm dsdk-vscode/package.json.bak
          echo "Updated extension version to ${{ env.VERSION }}"
          grep '"version"' dsdk-vscode/package.json

      - name: Build VS Code Extension
        shell: bash
        run: |
          cd dsdk-vscode
          npm ci
          npm run vscode:prepublish
          npx vsce package
          echo "VSIX_FILE=$(ls -1 *.vsix | head -1)" >> $GITHUB_ENV
          cd ..
          echo "VSIX_FILE=${{ env.VSIX_FILE }}"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9  # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.os == 'ubuntu-latest'
        run: cargo install cross --locked

      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            cross build --verbose --release --target ${{ matrix.target }}
          else
            cargo build --verbose --release --target ${{ matrix.target }}
          fi

      - name: Build archive
        shell: bash
        run: |
          # Package both cim CLI and GUI binaries
          package_name="cim-suite"
          cli_binary="cim"
          gui_binary="cim-installer"

          dirname="$package_name-${{ env.VERSION }}-${{ matrix.target }}"
          mkdir "$dirname"

          # Move binaries and verify they exist
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cli_path="target/${{ matrix.target }}/release/$cli_binary.exe"
            gui_path="target/${{ matrix.target }}/release/$gui_binary.exe"
          else
            cli_path="target/${{ matrix.target }}/release/$cli_binary"
            gui_path="target/${{ matrix.target }}/release/$gui_binary"
          fi

          # Verify both binaries exist
          if [ ! -f "$cli_path" ]; then
            echo "Error: CLI binary not found at $cli_path"
            exit 1
          fi
          if [ ! -f "$gui_path" ]; then
            echo "Error: GUI binary not found at $gui_path"
            exit 1
          fi

          # Move binaries to archive directory
          mv "$cli_path" "$dirname/"
          mv "$gui_path" "$dirname/"

          # Copy VS Code extension (platform-agnostic)
          if [ -f "dsdk-vscode/${{ env.VSIX_FILE }}" ]; then
            cp "dsdk-vscode/${{ env.VSIX_FILE }}" "$dirname/"
            echo "Included VS Code extension: ${{ env.VSIX_FILE }}"
          else
            echo "Warning: VS Code extension not found at dsdk-vscode/${{ env.VSIX_FILE }}"
          fi

          # Create a simple README for the archive
          cat > "$dirname/README.txt" << 'EOF'
          Code in Motion
          ==============

          This archive contains the complete cim toolkit:

          Binaries:
          - cim: Command-line interface for workspace management
          - cim-installer: Graphical PoC installer interface

          Extensions:
          - cim-*.vsix: VS Code extension for cim task integration
            Install in VS Code via: Extensions → Install from VSIX...

          Usage:
          ------
          For CLI usage: ./cim --help
          For GUI usage: ./cim-installer
          For VS Code: Install the .vsix file via the Extensions menu

          For more information, visit:
          https://github.com/analogdevicesinc/cim
          EOF

          # Verify binaries were moved successfully
          echo "Archive contents:"
          ls -la "$dirname"

          # Create archive
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            7z a "$dirname.zip" "$dirname"
            echo "ASSET=$dirname.zip" >> $GITHUB_ENV
          else
            tar -czf "$dirname.tar.gz" "$dirname"
            echo "ASSET=$dirname.tar.gz" >> $GITHUB_ENV
          fi

      - name: Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b  # v2.5.0
        with:
          files: |
            ${{ env.ASSET }}
