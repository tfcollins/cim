# Cross-compilation configuration for Code in Motion (cim)
# Configuration for building on Apple Silicon (aarch64-apple-darwin host)

[build]
# Force build scripts to run in the container, not on host
xargo = false

[build.env]
passthrough = [
    "RUST_BACKTRACE",
]

[target.aarch64-unknown-linux-gnu]
image = "ghcr.io/cross-rs/aarch64-unknown-linux-gnu:main"

[target.x86_64-unknown-linux-gnu]
dockerfile = "scripts/Dockerfile.x86_64-linux"

[target.x86_64-pc-windows-gnu]
image = "ghcr.io/cross-rs/x86_64-pc-windows-gnu:main"
