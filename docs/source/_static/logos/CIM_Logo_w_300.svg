<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 80" width="300" height="80">
  <defs>
    <linearGradient id="motionGradDark" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4DA6FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00CCEE;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Motion lines -->
  <rect x="2" y="28" width="18" height="3" rx="1.5" fill="url(#motionGradDark)" opacity="0.3"/>
  <rect x="8" y="37" width="24" height="3" rx="1.5" fill="url(#motionGradDark)" opacity="0.5"/>
  <rect x="2" y="46" width="18" height="3" rx="1.5" fill="url(#motionGradDark)" opacity="0.3"/>
  <!-- Arrow / play shape -->
  <polygon points="36,24 60,40 36,56" fill="url(#motionGradDark)"/>
  <!-- "cim" text -->
  <text x="70" y="52" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="42" font-weight="700" fill="#e8e8f0" letter-spacing="-1">cim</text>
  <!-- "code in motion" subtitle -->
  <text x="71" y="68" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="400" fill="#aaaabb" letter-spacing="3.5">CODE IN MOTION</text>
</svg>
